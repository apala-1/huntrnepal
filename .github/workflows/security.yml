name: HuntrNepal Security CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan-backend:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run npm audit (dependency vulnerability scan)
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install ESLint security plugin
        working-directory: ./backend
        run: npm install --save-dev eslint eslint-plugin-security

      - name: Create ESLint config
        working-directory: ./backend
        run: |
          echo '{
            "plugins": ["security"],
            "extends": ["plugin:security/recommended"],
            "env": { "node": true, "es2021": true }
          }' > .eslintrc.json

      - name: Run ESLint security scan
        working-directory: ./backend
        run: npx eslint src/ --ext .js
        continue-on-error: true

  security-scan-frontend:
    name: Frontend Security Scan  
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build frontend (catch build errors)
        working-directory: ./frontend
        run: npm run build

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [security-scan-backend, security-scan-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend Docker image
        run: docker build -t huntrnepal-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t huntrnepal-frontend ./frontend

      - name: Confirm images built
        run: docker images | grep huntrnepal